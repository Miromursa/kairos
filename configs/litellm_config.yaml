model_list:
  # Local vLLM backends
  - model_name: qwen-primary
    litellm_params:
      model: openai/qwen-primary
      api_base: http://vllm-primary:8000/v1
      api_key: none
      rpm: 100

  - model_name: qwen-coder
    litellm_params:
      model: openai/qwen-coder
      api_base: http://vllm-utility:8000/v1
      api_key: none
      rpm: 100

  # ------------------------------------------------------------------
  # CLOUD ENDPOINTS — MANUALLY ACTIVATED ONLY
